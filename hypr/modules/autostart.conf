#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = hyprctl setcursor Bibata-Modern-Ice 20

exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = awww-daemon
exec-once = ~/.config/waybar/scripts/launch.sh

exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

exec-once = wl-clip-persist --clipboard regular

exec-once = arch-update --tray

exec-once = systemctl --user import-environment DISPLAY WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

exec-once = hypridle

exec-once = /usr/lib/gnome-settings-daemon/gsd-xsettings

exec-once = /usr/lib/gsd-xsettings

exec-once = hyprctl keyword general:col.active_border "$(grep 'col.active_border' ~/.config/hypr/modules/active.conf | awk '{print $3}')"
exec-once = hyprctl keyword general:col.inactive_border "$(grep 'col.inactive_border' ~/.config/hypr/modules/active.conf | awk '{print $3}')"
